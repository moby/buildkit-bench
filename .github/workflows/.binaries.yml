# reusable workflow
name: .binaries

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      target:
        type: string
        required: true
      repo:
        type: string
        required: true
      artifact_key:
        type: string
        required: true
      cache_prefix:
        type: string
        required: true
      candidates_key:
        type: string
        required: true
      refs:
        type: string
        required: true
      last_days:
        type: string
        default: 7
      last_releases:
        type: string
        default: 3
    secrets:
      DOCKERHUB_TOKEN:
        required: false

env:
  GO_VERSION: 1.26
  SETUP_BUILDX_VERSION: latest
  SETUP_BUILDKIT_IMAGE: moby/buildkit:latest
  BUILDKIT_CACHE_REPO: moby/buildkit-bench-cache

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      includes: ${{ steps.set.outputs.includes }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      -
        name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      -
        name: Set includes
        id: set
        run: |
          go run -mod=vendor ./cmd/refcandidates \
            --repo "$INPUT_REPO" \
            --refs "$INPUT_REFS" \
            --last-days "$LAST_DAYS" \
            --last-releases "$LAST_RELEASES" \
            --file-output "./bin/${CANDIDATES_KEY}.json" \
            --gha-output includes
        env:
          CANDIDATES_KEY: ${{ inputs.candidates_key }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_REFS: ${{ inputs.refs }}
          LAST_DAYS: ${{ inputs.last_days }}
          LAST_RELEASES: ${{ inputs.last_releases }}
      -
        name: List candidates
        run: |
          jq . "./bin/${CANDIDATES_KEY}.json"
        env:
          CANDIDATES_KEY: ${{ inputs.candidates_key }}
      -
        name: Upload candidates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.candidates_key }}
          path: ./bin/${{ inputs.candidates_key }}.json
          if-no-files-found: error
          retention-days: 7

  build:
    runs-on: ubuntu-24.04
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.includes) }}
    steps:
      -
        name: Prepare
        run: |
          case "$TARGET" in
            buildkit)
              echo "BUILDKIT_REPO=$INPUT_REPO" >> "$GITHUB_ENV"
              echo "BUILDKIT_REFS=$REF" >> "$GITHUB_ENV"
              ;;
            buildx)
              echo "BUILDX_REPO=$INPUT_REPO" >> "$GITHUB_ENV"
              echo "BUILDX_REFS=$REF" >> "$GITHUB_ENV"
              ;;
            *)
              echo "unsupported target: $TARGET" >&2
              exit 1
              ;;
          esac
        env:
          INPUT_REPO: ${{ inputs.repo }}
          REF: ${{ matrix.ref }}
          TARGET: ${{ inputs.target }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}
          buildkitd-flags: --debug
      -
        name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          targets: ${{ inputs.target }}-build
          provenance: false
          set: |
            *.output=./bin/binaries/${{ matrix.name }}
            *.cache-from=type=registry,ref=${{ env.BUILDKIT_CACHE_REPO }}:${{ inputs.cache_prefix }}-${{ matrix.commit }}
            *.cache-to=type=registry,ignore-error=true,mode=max,ref=${{ env.BUILDKIT_CACHE_REPO }}:${{ inputs.cache_prefix }}-${{ matrix.commit }}
            *.cache-to=type=registry,ignore-error=true,mode=max,ref=${{ env.BUILDKIT_CACHE_REPO }}:${{ inputs.cache_prefix }}-${{ matrix.ref }}
      -
        # https://github.com/actions/upload-artifact/?tab=readme-ov-file#permission-loss
        name: Tar binaries
        working-directory: ./bin/binaries
        run: tar -czvf "../binaries-${BINARY_NAME}.tar.gz" *
        env:
          BINARY_NAME: ${{ matrix.name }}
      -
        name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_key }}-${{ matrix.name }}
          path: ./bin/binaries-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 7
