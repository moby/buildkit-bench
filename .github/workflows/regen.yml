name: regen

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/regen.yml
      - cmd/gotestmetrics/gen.go
  pull_request:
    paths:
      - .github/workflows/regen.yml
      - cmd/gotestmetrics/gen.go

env:
  SETUP_BUILDX_VERSION: latest
  SETUP_BUILDKIT_IMAGE: moby/buildkit:latest
  BUILDKIT_CACHE_REPO: moby/buildkit-bench-cache
  GEN_VALIDATION_MODE: strict
  WEBSITE_PUBLIC_PATH: /buildkit-bench/

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      results: ${{ steps.pages-results.outputs.results }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: List deployed results
        id: pages-results
        uses: actions/github-script@v9
        with:
          script: |
            const { exitCode, stdout } = await exec.getExecOutput('node', ['./website/downloadResults.js', '--list'], {
              ignoreReturnCode: true,
            });
            if (exitCode !== 0) {
              core.setFailed(`downloadResults.js failed with exit code ${exitCode}`);
            } else {
              core.setOutput('results', stdout.trim());
            }

  gen:
    runs-on: ubuntu-24.04
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        result: ${{ fromJson(needs.prepare.outputs.results) }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Download deployed result
        id: pages-result
        uses: actions/github-script@v9
        with:
          script: |
            const { exitCode } = await exec.getExecOutput('node', ['./website/downloadResults.js', process.env.RESULT_NAME], {
              ignoreReturnCode: true,
            });
            if (exitCode !== 0) {
              core.setFailed(`downloadResults.js failed with exit code ${exitCode}`);
            }
        env:
          RESULT_NAME: ${{ matrix.result }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}
          buildkitd-flags: --debug
      -
        name: Generate HTML report
        uses: docker/bake-action@v7
        with:
          source: "{{defaultContext}}"
          targets: tests-gen
          provenance: false
          set: |
            *.cache-from=type=registry,ref=${{ env.BUILDKIT_CACHE_REPO }}:tests-base
            *.contexts.tests-results=cwd://website/public/result/${{ matrix.result }}
            *.output=./bin/report/${{ matrix.result }}
      -
        name: Copy files
        run: |
          if [[ -f ./bin/report/${{ matrix.result }}/logs.tar.gz ]] && [[ -d ./website/public/result/${{ matrix.result }}/logs ]]; then
            rm -rf ./website/public/result/${{ matrix.result }}/logs
          fi
          rsync -av --exclude='*.html' ./website/public/result/${{ matrix.result }}/ ./bin/report/${{ matrix.result }}/
      -
        name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: report-${{ matrix.result }}
          path: ./bin/report
          if-no-files-found: error

  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - gen
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Download reports
        uses: actions/download-artifact@v8
        with:
          path: ./website/public/result
          pattern: report-*
          merge-multiple: true
      -
        name: Build website
        uses: docker/bake-action@v7
        with:
          source: .
          no-cache: true
          targets: website
          provenance: false
      -
        name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./bin/website

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    needs:
      - publish
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      -
        name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v5
