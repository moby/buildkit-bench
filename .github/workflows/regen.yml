name: regen

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/regen.yml
      - cmd/gotestmetrics/gen.go
  pull_request:
    paths:
      - .github/workflows/regen.yml
      - cmd/gotestmetrics/gen.go

env:
  SETUP_BUILDX_VERSION: latest
  SETUP_BUILDKIT_IMAGE: moby/buildkit:latest
  BUILDKIT_CACHE_REPO: moby/buildkit-bench-cache
  GEN_VALIDATION_MODE: strict
  WEBSITE_PUBLIC_PATH: /buildkit-bench/

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      results: ${{ steps.pages-results.outputs.results }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      -
        name: List deployed results
        id: pages-results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { exitCode, stdout } = await exec.getExecOutput('node', ['./website/downloadResults.js', '--list'], {
              ignoreReturnCode: true,
            });
            if (exitCode !== 0) {
              core.setFailed(`downloadResults.js failed with exit code ${exitCode}`);
            } else {
              core.setOutput('results', stdout.trim());
            }

  gen:
    runs-on: ubuntu-24.04
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        result: ${{ fromJson(needs.prepare.outputs.results) }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      -
        name: Download deployed result
        id: pages-result
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { exitCode } = await exec.getExecOutput('node', ['./website/downloadResults.js', process.env.RESULT_NAME], {
              ignoreReturnCode: true,
            });
            if (exitCode !== 0) {
              core.setFailed(`downloadResults.js failed with exit code ${exitCode}`);
            }
        env:
          RESULT_NAME: ${{ matrix.result }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}
          buildkitd-flags: --debug
      -
        name: Generate HTML report
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          source: "{{defaultContext}}"
          targets: tests-gen
          provenance: false
          set: |
            *.cache-from=type=registry,ref=${{ env.BUILDKIT_CACHE_REPO }}:tests-base
            *.contexts.tests-results=cwd://website/public/result/${{ matrix.result }}
            *.output=./bin/report/${{ matrix.result }}
      -
        name: Copy files
        run: |
          if [[ -f "./bin/report/${RESULT_NAME}/logs.tar.gz" ]] && [[ -d "./website/public/result/${RESULT_NAME}/logs" ]]; then
            rm -rf "./website/public/result/${RESULT_NAME}/logs"
          fi
          rsync -av --exclude='*.html' "./website/public/result/${RESULT_NAME}/" "./bin/report/${RESULT_NAME}/"
        env:
          RESULT_NAME: ${{ matrix.result }}
      -
        name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-${{ matrix.result }}
          path: ./bin/report
          if-no-files-found: error

  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - gen
    outputs:
      pages_artifact_id: ${{ steps.upload-pages-artifact.outputs.artifact-id }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      -
        name: Download reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./website/public/result
          pattern: report-*
          merge-multiple: true
      -
        name: Build website
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          source: .
          no-cache: true
          targets: website
          provenance: false
      -
        name: Archive GitHub Pages artifact
        run: |
          tar --dereference --hard-dereference --directory ./bin/website -cvf "$RUNNER_TEMP/artifact.tar" .
      -
        name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        id: upload-pages-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    needs:
      - publish
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      -
        name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  cleanup-pages-artifact:
    if: always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/master' && needs.publish.result == 'success' && needs.deploy.result != 'skipped' && needs.publish.outputs.pages_artifact_id != ''
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    needs:
      - publish
      - deploy
    steps:
      -
        name: Delete GitHub Pages artifact
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ARTIFACT_ID: ${{ needs.publish.outputs.pages_artifact_id }}
        with:
          script: |
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: Number(process.env.ARTIFACT_ID),
            });
